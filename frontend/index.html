<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Typing Speed Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="three-container"></div>
    
    <div class="container">
        <header>
            <h1>⌨️ Code Typing Speed Test</h1>
            <div class="lang-select">
                <label for="language">Language:</label>
                <select id="language">
                    <option value="js">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                </select>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">WPM</span>
                <span id="wpm" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Accuracy</span>
                <span id="accuracy" class="stat-value">100%</span>
            </div>
            <div class="stat">
                <span class="stat-label">Time</span>
                <span id="time" class="stat-value">60s</span>
            </div>
            <div class="stat">
                <span class="stat-label">CPM</span>
                <span id="cpm" class="stat-value">0</span>
            </div>
        </div>

        <div class="code-container">
            <pre id="code-display"><span class="placeholder">Select a language and start typing...</span></pre>
            <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>

        <div class="leaderboard-section">
            <h2>🏆 Leaderboard (Top 10)</h2>
            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>WPM</th>
                        <th>Accuracy</th>
                        <th>Language</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                </tbody>
            </table>
        </div>
    </div>

    <div id="results-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🎉 Test Complete!</h2>
            <div class="results-grid">
                <div class="result-item">
                    <span class="result-label">WPM</span>
                    <span id="result-wpm" class="result-value">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Accuracy</span>
                    <span id="result-accuracy" class="result-value">0%</span>
                </div>
                <div class="result-item">
                    <span class="result-label">CPM</span>
                    <span id="result-cpm" class="result-value">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Characters</span>
                    <span id="result-chars" class="result-value">0/0</span>
                </div>
            </div>
            <div class="name-input">
                <label for="player-name">Enter your name:</label>
                <input type="text" id="player-name" maxlength="20" placeholder="Your name">
            </div>
            <button id="submit-result">Submit to Leaderboard</button>
            <button id="restart-btn" class="secondary">Try Again</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
